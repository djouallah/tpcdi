name: dbt-docs

# Publish the dbt docs to GitHub Pages. Regenerates the static catalog READ-ONLY against the live
# OneLake warehouse (the tpcdi<sf> schema the ETL already built) — no rebuild — then deploys.
# Manual: pick the scale factor whose schema to document (defaults to 20). Uses the same OIDC
# secrets as tpc_di.yml (AZURE_CLIENT_ID, AZURE_TENANT_ID).
on:
  workflow_dispatch:
    inputs:
      scale_factor:
        # Restricted to the upstream-validated scale factors the ETL builds — no arbitrary SF.
        description: "Scale factor schema to document (tpcdi<sf>)"
        type: choice
        options: ["10", "100", "1000", "5000", "10000", "20000"]
        default: "10"

# Never blocks / is blocked by the ETL; independent of tpcdi-onelake.
concurrency:
  group: tpcdi-pages
  cancel-in-progress: true

jobs:
  # Build the static docs. Runs OUTSIDE any GitHub environment, so duckrun's OIDC token minting
  # presents the subject `repo:<owner>/<repo>:ref:refs/heads/main` — the one the Fabric federated
  # credential trusts. (A job bound to the `github-pages` environment would present a different
  # subject and fail the OneLake auth — that's why deploy is a separate job below.)
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      WS_ID: 1c52481c-0523-4a5a-bbde-fdc932bd77c2
      LH_NAME: tpcdi
      DBT_SCHEMA: tpcdi${{ inputs.scale_factor || vars.TPCDI_SF || '10' }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # The azure extension's default transport fails the OneLake TLS handshake on the runner.
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install duckrun (pulls dbt-duckdb + duckdb + deltalake)
        run: pip install --quiet -r requirements.txt

      # No azure/login and no token steps: duckrun mints its own tokens via GitHub OIDC
      # workload-identity federation (AZURE_CLIENT_ID/AZURE_TENANT_ID env + id-token: write)
      # for both the lakehouse lookup and the OneLake reads, refreshing near expiry.
      - name: Resolve the existing 'tpcdi' lakehouse (find-only — never creates)
        run: |
          set -euo pipefail
          LH_ID=$(python -c "import duckrun; print(duckrun.workspace('$WS_ID').lakehouse_id('$LH_NAME'))") \
            || { echo "lakehouse '$LH_NAME' not found in workspace $WS_ID — run the ETL workflow first"; exit 1; }
          echo "WAREHOUSE_PATH=abfss://$WS_ID@onelake.dfs.fabric.microsoft.com/$LH_ID/Tables" >> "$GITHUB_ENV"
          echo "lakehouse '$LH_NAME' = $LH_ID"

      - name: dbt docs generate (static — real catalog over the OneLake Delta tables)
        run: |
          dbt deps --project-dir singlepass
          dbt docs generate --static --project-dir singlepass --profiles-dir singlepass

      - name: Assemble the Pages site (static_index.html → index.html)
        run: |
          mkdir -p _site
          cp singlepass/target/static_index.html _site/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # Deploy the built artifact to Pages. GitHub→Pages OIDC only (no Azure), so binding this job to
  # the `github-pages` environment is fine.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
