tpcdi_seq:
  target: dev
  outputs:
    dev:
      type: duckrun
      threads: 1                      # duckrun is single-writer; keep at 1
      # Sequential warehouse schema — a sibling of the single-pass schema (e.g. tpcdi3_seq
      # next to tpcdi3) in the same lakehouse, so the identical table names never clash.
      schema: "{{ env_var('DBT_SCHEMA', 'tpcdi_seq') }}"
      root_path: "{{ env_var('WAREHOUSE_PATH', './warehouse') }}"
      storage_options:
        bearer_token: "{{ env_var('ONELAKE_TOKEN', '') }}"
