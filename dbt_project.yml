name: 'tpcdi'
version: '1.0.0'
config-version: 2

profile: 'tpcdi'

# Root directory holding the DIGen output (contains Batch1/ Batch2/ Batch3/).
# Overridden per-run: dbt run --vars '{tpcdi_dir: /abs/path/to/staging}'
vars:
  tpcdi_dir: "{{ env_var('TPCDI_DIR', './staging') }}"

model-paths: ["models"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  tpcdi:
    +materialized: table
