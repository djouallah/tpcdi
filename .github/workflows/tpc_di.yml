name: tpc-di

# TPC-DI (the TPC data-integration / ETL benchmark), SINGLE-PASS mode, on duckrun, run
# entirely on Microsoft Fabric OneLake. A dedicated `tpcdi` lakehouse (created if absent)
# holds BOTH the raw seed (Files/tpcdi/sf<N>) and the dbt warehouse (Tables/tpcdi<N> — one
# schema per scale factor). The seed is generated ONCE per scale factor and streamed to
# OneLake one table at a time (bounded local disk); later runs detect it and skip
# generation. dbt reads the seed from OneLake and writes the Delta tables back to OneLake —
# the runner never hosts the whole dataset. See README.md.
#
# The sequential (3-batch) mode is a SEPARATE, fully independent workflow
# (tpc_di_sequential.yml) — the two share only the raw OneLake seed, never wait on each
# other, and write different schemas (tpcdi<N> vs tpcdi<N>_seq).
#
# Requires two repo secrets for the OIDC login: AZURE_CLIENT_ID, AZURE_TENANT_ID (a Fabric
# service principal / app registration federated to this repo). No client secret is stored.
on:
  push:
    branches: ["**"]
    # Allowlist, not denylist: the heavy single-pass build + test runs ONLY when the
    # single-pass code, the shared Python deps, or this workflow itself changed. The seed
    # is generated once and reused, so with nothing relevant changed there is nothing to
    # re-test — the workflow simply does not fire. Excluded even within singlepass/: the
    # read-only query runner (its own queries.yml) and docs.
    paths:
      - "singlepass/**"
      - "!singlepass/queries/**"
      - "!singlepass/scripts/run_queries.py"
      - "!singlepass/**/*.md"
      - "requirements.txt"
      - ".github/workflows/tpc_di.yml"
  pull_request:
    paths:
      - "singlepass/**"
      - "!singlepass/queries/**"
      - "!singlepass/scripts/run_queries.py"
      - "!singlepass/**/*.md"
      - "requirements.txt"
      - ".github/workflows/tpc_di.yml"
  workflow_dispatch:
    inputs:
      scale_factor:
        # Locked to the upstream-validated scale factors (a `choice`, not free text) so no one
        # can dispatch an arbitrary SF. sf3 excluded — see tpc_di_sequential.yml for the DIGen
        # C_TIER_INV quirk that makes sf3 audit-unreliable.
        description: "TPC-DI scale factor (upstream-validated values only)"
        type: choice
        options: ["10", "100", "1000", "5000", "10000", "20000"]
        default: "10"

permissions:
  contents: read
  id-token: write

# One TPC-DI run at a time — every run writes the same `tpcdi` schema in the one lakehouse.
concurrency:
  group: tpcdi-onelake
  cancel-in-progress: false

jobs:
  tpc-di:
    runs-on: ubuntu-latest
    env:
      # scale_factor input wins, else the repo variable TPCDI_SF, else 10. Keys the seed cache.
      TPCDI_SF: ${{ inputs.scale_factor || vars.TPCDI_SF || '10' }}
      TPCDI_GEN_TIMEOUT: '10800'
      TPCDI_JVM_XMX: '4g'
      # Local scratch for the per-table streamer. NB: on the hosted runner `/mnt` is NOT a separate
      # ephemeral disk — it's the same `/dev/root` device as `/` (~16 GiB free total). The streamer
      # only holds one table at a time, so peak local use is the largest single table, which is what
      # sets the seed's scale-factor ceiling. DuckDB spill (dbt + audit) uses its default temp on that
      # same one disk — we deliberately do NOT override temp_directory (see profiles.yml).
      TPCDI_STAGING: /mnt/tpcdi/staging
      TPCDI_WORK: /mnt/tpcdi/work
      WS_ID: 1c52481c-0523-4a5a-bbde-fdc932bd77c2
      LH_NAME: tpcdi
      # Schema is per-scale-factor (tpcdi3, tpcdi300, …) so every SF gets its own set of Delta
      # tables under Tables/<schema>/ in the one `tpcdi` lakehouse — different SFs never clobber
      # each other. Same expression as TPCDI_SF above (sibling env keys can't reference each other).
      DBT_SCHEMA: tpcdi${{ inputs.scale_factor || vars.TPCDI_SF || '10' }}
      # Exported so the adapter (and stream_seed) can re-mint a OneLake token mid-build via GitHub OIDC.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # The azure extension's default transport fails the OneLake TLS handshake on the runner.
      AZURE_TRANSPORT_OPTION_TYPE: curl
      # Line-buffer python stdout so remote/task logs stream into the step live.
      PYTHONUNBUFFERED: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Show runner disk (capacity is the real per-table-streaming ceiling — largest single table must fit)
        run: df -h / /mnt 2>/dev/null || df -h
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # DIGen ships PDGF built with an Eclipse jar-in-jar loader that breaks on Java 9+.
          java-version: '8'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Cache the wheels keyed on requirements.txt — a warm cache makes the install below
          # near-instant, which also keeps GitHub from leaving the step's spinner stuck at
          # "in_progress" (it drops the step-completion event when a step runs long).
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install duckrun from PyPI (pulls dbt-duckdb + duckdb + deltalake) + obstore
        # obstore streams the seed to OneLake as a multipart upload (stream_seed.py) — no per-file
        # size limit, unlike duckrun's conn.copy (whole file into one ~4 GiB-capped DuckDB BLOB).
        run: pip install --quiet -r requirements.txt

      # No azure/login and no token steps: duckrun mints its own tokens for BOTH planes via
      # GitHub OIDC workload-identity federation (AZURE_CLIENT_ID/AZURE_TENANT_ID env +
      # id-token: write) — control plane for the lakehouse API, storage plane for OneLake —
      # and re-acquires near expiry, so long runs never outlive a static ~1h token.
      - name: Ensure the 'tpcdi' lakehouse exists (duckrun, idempotent) + resolve OneLake paths
        run: |
          set -euo pipefail
          LH_ID=$(python -c "import duckrun; print(duckrun.workspace('$WS_ID').create_lakehouse('$LH_NAME'))")
          ROOT="abfss://$WS_ID@onelake.dfs.fabric.microsoft.com/$LH_ID"
          {
            echo "WAREHOUSE_PATH=$ROOT/Tables"
            echo "TPCDI_DIR=$ROOT/Files/tpcdi/sf${TPCDI_SF}"
          } >> "$GITHUB_ENV"
          echo "lakehouse '$LH_NAME' = $LH_ID"

      # Generate + stream one PDGF table at a time to OneLake (mints a fresh token per table), so
      # local disk only ever holds a single table — any scale factor fits the runner. Resumable and
      # idempotent: stream_seed lists what is already in Files/tpcdi/sf<N> and skips every table whose
      # files are present at their recorded byte size (per-table manifests), regenerating only the
      # missing ones. A full cache hit finishes in seconds and clones no datagen toolkit — so we
      # always run it (no separate existence gate).
      - name: Generate + stream the seed to OneLake (per-table, resumable)
        run: |
          sudo mkdir -p /mnt/tpcdi && sudo chown "$USER:$USER" /mnt/tpcdi
          python ./singlepass/scripts/stream_seed.py --sf "${TPCDI_SF}" --prefix "tpcdi/sf${TPCDI_SF}"

      # Install dbt package deps (dbt_utils) before any dbt command — `dbt run` parses packages.yml
      # and aborts if the packages aren't installed. Offline/fast; no OneLake token needed.
      - name: dbt deps (install dbt_utils for the tests)
        run: dbt deps --project-dir singlepass

      # A big SF can run for hours, past a token's ~1h life — the adapter self-mints and
      # refreshes via GitHub OIDC. If an invocation still dies we `dbt retry` — which RESUMES
      # from the failed/skipped models, so progress accumulates across attempts.
      - name: dbt run (full TPC-DI load — reads + writes OneLake; resumes on failure)
        env:
          DBT_MAX_ATTEMPTS: '5'
        run: |
          set +e
          cmd="run"; attempt=1
          while :; do
            echo "== dbt $cmd — attempt $attempt/$DBT_MAX_ATTEMPTS =="
            dbt $cmd --project-dir singlepass --profiles-dir singlepass
            rc=$?
            if [ $rc -eq 0 ]; then echo "dbt succeeded on attempt $attempt"; break; fi
            # A compile/parse failure aborts before any node runs, so no target/run_results.json is
            # written — `dbt retry` has nothing to resume and would fail identically every attempt.
            # Bail out now instead of burning the remaining attempts on a deterministic error.
            if [ ! -f target/run_results.json ]; then
              echo "dbt failed before producing run_results.json (compile/parse error, rc=$rc) — not retryable"; exit $rc
            fi
            if [ "$attempt" -ge "$DBT_MAX_ATTEMPTS" ]; then
              echo "dbt still failing after $attempt attempt(s) (rc=$rc)"; exit $rc
            fi
            echo "attempt $attempt failed (rc=$rc) — resuming with 'dbt retry' (adapter self-mints a fresh token)"
            cmd="retry"; attempt=$((attempt+1))
          done

      # Docs before the audit: the static dbt catalog reflects the LIVE OneLake Delta tables, so the
      # page carries real row-count / byte / last-modified stats per model (adapter self-mints).
      - name: dbt docs generate (static — real catalog over the OneLake Delta tables)
        run: dbt docs generate --static --project-dir singlepass --profiles-dir singlepass
      - name: Verify the tpc-di catalog carries Delta table stats
        run: python ./singlepass/tools/check_catalog_stats.py singlepass/target/catalog.json tpcdi
      - name: Upload tpc-di docs (static stats page)
        uses: actions/upload-artifact@v4
        with:
          name: docs-tpcdi
          path: singlepass/target/static_index.html
          if-no-files-found: error

      # dbt-native transformation tests — the per-model correctness gate (uniqueness, referential
      # integrity, enum domains). Read-only over the OneLake Delta tables (delta_scan views); runs
      # LAST, after the warehouse build and docs (adapter self-mints a fresh token).
      - name: dbt test (validate transformations against the OneLake warehouse)
        run: dbt test --project-dir singlepass --profiles-dir singlepass

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tpc-di-logs
          path: |
            singlepass/logs/
            singlepass/target/
          if-no-files-found: ignore
