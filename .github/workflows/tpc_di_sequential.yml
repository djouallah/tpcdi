name: tpc-di-sequential

# TPC-DI SEQUENTIAL (3-batch) mode — the spec's real execution model: a historical load
# (Batch1) then two incremental CDC batches (Batch2, Batch3), per-batch validation rows
# written to DImessages, and the COMPLETE Appendix-A audit at the end. Runs the sequential/
# dbt project into a SEPARATE schema (tpcdi<N>_seq) in the same `tpcdi` lakehouse.
#
# This workflow writes its OWN schema (tpcdi<N>_seq) and streams its OWN seed, but it SHARES
# the single-pass workflow's concurrency group (tpcdi-onelake) so the two can never run at
# once: the raw OneLake seed (Files/tpcdi/sf<N>) is the shared asset, and running both in
# parallel would regenerate + race on it. Serialized, whichever runs second finds the seed
# already present (seed_manifest cache-hit) and skips straight to its warehouse build + audit.
#
# Requires the same two repo secrets as tpc_di.yml (AZURE_CLIENT_ID, AZURE_TENANT_ID).
on:
  push:
    branches: ["**"]
    # Only sequential-mode changes (and this workflow / shared requirements) trigger it —
    # a single-pass-only change must not rerun the sequential load. (GitHub forbids pairing
    # paths with paths-ignore on one event, so docs are excluded via a negated pattern.)
    paths:
      - "sequential/**"
      - "!sequential/**/*.md"
      - "requirements.txt"
      - ".github/workflows/tpc_di_sequential.yml"
  pull_request:
    paths:
      - "sequential/**"
      - "!sequential/**/*.md"
      - "requirements.txt"
      - ".github/workflows/tpc_di_sequential.yml"
  workflow_dispatch:
    inputs:
      scale_factor:
        # Locked to the scale factors upstream (shannon-barrow/databricks-tpc-di) actually
        # validates + ships answer keys for — a `choice` so no one can dispatch an arbitrary
        # SF. sf3 is deliberately excluded: its generated CustomerMgmt.xml hits a DIGen
        # changedThisUpdate() quirk (e.g. customer 2204: NEW C_TIER=2 then UPDCUST C_TIER=6)
        # where the emitted invalid tier is real but PDGF's C_TIER_INV counter skips it,
        # making the 'customer tier alerts' audit check off-by-one against any faithful ETL.
        # Not reproducible at sf>=10.
        description: "TPC-DI scale factor (upstream-validated values only)"
        type: choice
        options: ["10", "100", "1000", "5000", "10000", "20000"]
        default: "10"
      rebuild:
        description: "Force a full warehouse rebuild (else reuse an already-built warehouse and only re-audit)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

# SHARES the single-pass workflow's concurrency group (tpcdi-onelake) so the two modes can
# NEVER run at the same time. They stream the same raw seed (Files/tpcdi/sf<N>); running in
# parallel would regenerate it twice (and race on the same OneLake paths). Serialized, whoever
# runs second gets a full seed cache-hit (seed_manifest skip) and only does its own warehouse
# build + audit. cancel-in-progress: false => the second queues and waits, never cancels.
concurrency:
  group: tpcdi-onelake
  cancel-in-progress: false

jobs:
  tpc-di-sequential:
    runs-on: ubuntu-latest
    env:
      TPCDI_SF: ${{ inputs.scale_factor || vars.TPCDI_SF || '10' }}
      TPCDI_GEN_TIMEOUT: '10800'
      TPCDI_JVM_XMX: '4g'
      TPCDI_STAGING: /mnt/tpcdi/staging
      TPCDI_WORK: /mnt/tpcdi/work
      WS_ID: 1c52481c-0523-4a5a-bbde-fdc932bd77c2
      LH_NAME: tpcdi
      # Sequential warehouse schema — sibling of the single-pass tpcdi<SF>.
      DBT_SCHEMA: tpcdi${{ inputs.scale_factor || vars.TPCDI_SF || '10' }}_seq
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - name: Show runner disk (per-table-streaming ceiling — largest single table must fit)
        run: df -h / /mnt 2>/dev/null || df -h
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # DIGen ships PDGF built with an Eclipse jar-in-jar loader that breaks on Java 9+.
          java-version: '8'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install duckrun (dbt-duckdb + duckdb + deltalake) + obstore
        run: pip install --quiet -r requirements.txt

      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Create the dedicated 'tpcdi' lakehouse (idempotent) + resolve its OneLake paths
        run: |
          set -euo pipefail
          BASE="https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/lakehouses"
          find_lh() {
            az rest --method get --resource https://api.fabric.microsoft.com --url "$BASE" \
              --query "value[?displayName=='$LH_NAME'].id | [0]" -o tsv 2>/dev/null
          }
          LH_ID="$(find_lh || true)"
          if [ -z "${LH_ID:-}" ] || [ "$LH_ID" = "None" ]; then
            echo "creating schema-enabled lakehouse '$LH_NAME' in workspace $WS_ID ..."
            az rest --method post --resource https://api.fabric.microsoft.com --url "$BASE" \
              --headers "Content-Type=application/json" \
              --body '{"displayName":"'"$LH_NAME"'","creationPayload":{"enableSchemas":true}}' >/dev/null || true
            for i in $(seq 1 12); do
              sleep 5; LH_ID="$(find_lh || true)"
              if [ -n "${LH_ID:-}" ] && [ "$LH_ID" != "None" ]; then break; fi
              echo "  waiting for '$LH_NAME' to appear ($i/12)..."
            done
          else
            echo "lakehouse '$LH_NAME' already exists ($LH_ID) — reusing."
          fi
          if [ -z "${LH_ID:-}" ] || [ "$LH_ID" = "None" ]; then
            echo "lakehouse '$LH_NAME' was not visible after creation"; exit 1
          fi
          ROOT="abfss://$WS_ID@onelake.dfs.fabric.microsoft.com/$LH_ID"
          {
            echo "WAREHOUSE_PATH=$ROOT/Tables"
            echo "TPCDI_DIR=$ROOT/Files/tpcdi/sf${TPCDI_SF}"
          } >> "$GITHUB_ENV"
          echo "lakehouse '$LH_NAME' = $LH_ID"

      - name: Acquire a fresh OneLake bearer token
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      # Idempotent seed: streams one PDGF table at a time to the SAME Files/tpcdi/sf<N> the
      # single-pass mode uses. A full cache hit (data already present from either workflow)
      # finishes in seconds and clones no datagen toolkit — so this makes the sequential
      # workflow self-sufficient without ever rebuilding the single-pass warehouse.
      - name: Generate + stream the seed to OneLake (per-table, resumable)
        run: |
          sudo mkdir -p /mnt/tpcdi && sudo chown "$USER:$USER" /mnt/tpcdi
          python ./sequential/scripts/stream_seed.py --sf "${TPCDI_SF}" --prefix "tpcdi/sf${TPCDI_SF}"

      - name: dbt deps (sequential project — dbt_utils)
        run: dbt deps --project-dir sequential --profiles-dir sequential

      # A fresh token before the long 3-batch load + test + audit (a big build can outlast
      # the ~1h token; the adapter also re-mints mid-run via GitHub OIDC).
      - name: Re-acquire a fresh OneLake bearer token before the load
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      # The load writes the warehouse + the full DImessages log (batch checkpoints,
      # visibility snapshots, alerts) and runs dbt test — but NOT the audit (--skip-audit),
      # so the Appendix-A audit is its own CI step below (clearer pass/fail in the UI).
      # run.py reuses an already-built warehouse by default (skips the ~15-min rebuild and
      # only re-audits); a workflow_dispatch with rebuild=true forces a full rebuild.
      - name: Sequential load + dbt test (reuses an existing warehouse unless rebuild=true)
        run: |
          EXTRA=""
          if [ "${{ inputs.rebuild }}" = "true" ]; then EXTRA="--rebuild"; fi
          python ./sequential/scripts/run.py --skip-generate --target onelake --batches 3 --skip-audit $EXTRA

      - name: Re-acquire a fresh OneLake bearer token before the audit
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Full Appendix-A audit (130 checks, blocking)
        run: python ./sequential/tools/run_sequential_audit.py

      - name: Upload sequential logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tpc-di-sequential-logs
          path: |
            sequential/logs/
            sequential/target/
          if-no-files-found: ignore
