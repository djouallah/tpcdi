name: tpc-di

# TPC-DI (the TPC data-integration / ETL benchmark) on duckrun, run entirely on Microsoft
# Fabric OneLake. A dedicated `tpcdi` lakehouse (created if absent) holds BOTH the raw seed
# (Files/tpcdi/sf<N>) and the dbt warehouse (Tables/tpcdi<N> — one schema per scale factor). The seed is generated ONCE per
# scale factor and streamed to OneLake one table at a time (bounded local disk); later runs
# detect it and skip generation. dbt reads the seed from OneLake and writes the Delta tables
# back to OneLake — the runner never hosts the whole dataset. See README.md.
#
# Requires two repo secrets for the OIDC login: AZURE_CLIENT_ID, AZURE_TENANT_ID (a Fabric
# service principal / app registration federated to this repo). No client secret is stored.
on:
  push:
    branches: ["**"]
    # The query side is read-only and has its own workflow (queries.yml) — never run the
    # heavy ETL load just because a query / its runner / docs changed.
    paths-ignore:
      - "queries/**"
      - "scripts/run_queries.py"
      - ".github/workflows/queries.yml"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "queries/**"
      - "scripts/run_queries.py"
      - ".github/workflows/queries.yml"
      - "**/*.md"
  workflow_dispatch:
    inputs:
      scale_factor:
        description: "TPC-DI scale factor (min 3)"
        type: string
        default: "3"

permissions:
  contents: read
  id-token: write

# One TPC-DI run at a time — every run writes the same `tpcdi` schema in the one lakehouse.
concurrency:
  group: tpcdi-onelake
  cancel-in-progress: false

jobs:
  tpc-di:
    runs-on: ubuntu-latest
    env:
      # scale_factor input wins, else the repo variable TPCDI_SF, else 20. Keys the seed cache.
      TPCDI_SF: ${{ inputs.scale_factor || vars.TPCDI_SF || '3' }}
      TPCDI_GEN_TIMEOUT: '10800'
      TPCDI_JVM_XMX: '4g'
      # Local scratch for the per-table streamer. NB: on the hosted runner `/mnt` is NOT a separate
      # ephemeral disk — it's the same `/dev/root` device as `/` (~16 GiB free total). The streamer
      # only holds one table at a time, so peak local use is the largest single table, which is what
      # sets the seed's scale-factor ceiling. DuckDB spill (dbt + audit) uses its default temp on that
      # same one disk — we deliberately do NOT override temp_directory (see profiles.yml).
      TPCDI_STAGING: /mnt/tpcdi/staging
      TPCDI_WORK: /mnt/tpcdi/work
      WS_ID: 1c52481c-0523-4a5a-bbde-fdc932bd77c2
      LH_NAME: tpcdi
      # Schema is per-scale-factor (tpcdi3, tpcdi300, …) so every SF gets its own set of Delta
      # tables under Tables/<schema>/ in the one `tpcdi` lakehouse — different SFs never clobber
      # each other. Same expression as TPCDI_SF above (sibling env keys can't reference each other).
      DBT_SCHEMA: tpcdi${{ inputs.scale_factor || vars.TPCDI_SF || '3' }}
      # Exported so the adapter (and stream_seed) can re-mint a OneLake token mid-build via GitHub OIDC.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # The azure extension's default transport fails the OneLake TLS handshake on the runner.
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - name: Show runner disk (capacity is the real per-table-streaming ceiling — largest single table must fit)
        run: df -h / /mnt 2>/dev/null || df -h
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # DIGen ships PDGF built with an Eclipse jar-in-jar loader that breaks on Java 9+.
          java-version: '8'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Cache the wheels keyed on requirements.txt — a warm cache makes the install below
          # near-instant, which also keeps GitHub from leaving the step's spinner stuck at
          # "in_progress" (it drops the step-completion event when a step runs long).
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install duckrun from PyPI (pulls dbt-duckdb + duckdb + deltalake) + obstore
        # obstore streams the seed to OneLake as a multipart upload (stream_seed.py) — no per-file
        # size limit, unlike duckrun's conn.copy (whole file into one ~4 GiB-capped DuckDB BLOB).
        run: pip install --quiet -r requirements.txt

      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Create the dedicated 'tpcdi' lakehouse (idempotent) + resolve its OneLake paths
        run: |
          set -euo pipefail
          BASE="https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/lakehouses"
          find_lh() {
            az rest --method get --resource https://api.fabric.microsoft.com --url "$BASE" \
              --query "value[?displayName=='$LH_NAME'].id | [0]" -o tsv 2>/dev/null
          }
          LH_ID="$(find_lh || true)"
          if [ -z "${LH_ID:-}" ] || [ "$LH_ID" = "None" ]; then
            echo "creating schema-enabled lakehouse '$LH_NAME' in workspace $WS_ID ..."
            az rest --method post --resource https://api.fabric.microsoft.com --url "$BASE" \
              --headers "Content-Type=application/json" \
              --body '{"displayName":"'"$LH_NAME"'","creationPayload":{"enableSchemas":true}}' >/dev/null || true
            for i in $(seq 1 12); do
              sleep 5; LH_ID="$(find_lh || true)"
              if [ -n "${LH_ID:-}" ] && [ "$LH_ID" != "None" ]; then break; fi
              echo "  waiting for '$LH_NAME' to appear ($i/12)..."
            done
          else
            echo "lakehouse '$LH_NAME' already exists ($LH_ID) — reusing."
          fi
          if [ -z "${LH_ID:-}" ] || [ "$LH_ID" = "None" ]; then
            echo "lakehouse '$LH_NAME' was not visible after creation"; exit 1
          fi
          ROOT="abfss://$WS_ID@onelake.dfs.fabric.microsoft.com/$LH_ID"
          {
            echo "WAREHOUSE_PATH=$ROOT/Tables"
            echo "TPCDI_DIR=$ROOT/Files/tpcdi/sf${TPCDI_SF}"
          } >> "$GITHUB_ENV"
          echo "lakehouse '$LH_NAME' = $LH_ID"

      - name: Acquire a fresh OneLake bearer token
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      # Generate + stream one PDGF table at a time to OneLake (mints a fresh token per table), so
      # local disk only ever holds a single table — any scale factor fits the runner. Resumable and
      # idempotent: stream_seed lists what is already in Files/tpcdi/sf<N> and skips every table whose
      # files are present at their recorded byte size (per-table manifests), regenerating only the
      # missing ones. A full cache hit finishes in seconds and clones no datagen toolkit — so we
      # always run it (no separate existence gate).
      - name: Generate + stream the seed to OneLake (per-table, resumable)
        run: |
          sudo mkdir -p /mnt/tpcdi && sudo chown "$USER:$USER" /mnt/tpcdi
          python ./scripts/stream_seed.py --sf "${TPCDI_SF}" --prefix "tpcdi/sf${TPCDI_SF}"

      # Install dbt package deps (dbt_utils) before any dbt command — `dbt run` parses packages.yml
      # and aborts if the packages aren't installed. Offline/fast; no OneLake token needed.
      - name: dbt deps (install dbt_utils for the tests)
        run: dbt deps --project-dir singlepass

      # A fresh token before the long dbt+audit phase (a big build can outlast the ~1h token).
      - name: Re-acquire a fresh OneLake bearer token before dbt
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      # A big SF can run for hours, past the token's ~1h life. The adapter refreshes mid-run via
      # GitHub OIDC; on top of that, if an invocation still dies we re-mint and `dbt retry` —
      # which RESUMES from the failed/skipped models, so progress accumulates across attempts.
      - name: dbt run (full TPC-DI load — reads + writes OneLake; re-mints token + resumes on failure)
        env:
          DBT_MAX_ATTEMPTS: '5'
        run: |
          set +e
          cmd="run"; attempt=1
          while :; do
            echo "== dbt $cmd — attempt $attempt/$DBT_MAX_ATTEMPTS =="
            dbt $cmd --project-dir singlepass --profiles-dir singlepass
            rc=$?
            if [ $rc -eq 0 ]; then echo "dbt succeeded on attempt $attempt"; break; fi
            # A compile/parse failure aborts before any node runs, so no target/run_results.json is
            # written — `dbt retry` has nothing to resume and would fail identically every attempt.
            # Bail out now instead of burning the remaining attempts on a deterministic error.
            if [ ! -f target/run_results.json ]; then
              echo "dbt failed before producing run_results.json (compile/parse error, rc=$rc) — not retryable"; exit $rc
            fi
            if [ "$attempt" -ge "$DBT_MAX_ATTEMPTS" ]; then
              echo "dbt still failing after $attempt attempt(s) (rc=$rc)"; exit $rc
            fi
            echo "attempt $attempt failed (rc=$rc) — re-minting OneLake token and resuming with 'dbt retry'"
            TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv 2>/dev/null)
            if [ -n "$TOKEN" ]; then
              echo "::add-mask::$TOKEN"; export ONELAKE_TOKEN="$TOKEN"; echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
            else
              echo "warning: az token refresh returned empty; relying on the adapter's own GH-OIDC refresh"
            fi
            cmd="retry"; attempt=$((attempt+1))
          done

      # Docs before the audit: the static dbt catalog reflects the LIVE OneLake Delta tables, so the
      # page carries real row-count / byte / last-modified stats per model. Fresh token first (dbt may
      # have run for hours).
      - name: Re-acquire a fresh OneLake bearer token before docs
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: dbt docs generate (static — real catalog over the OneLake Delta tables)
        run: dbt docs generate --static --project-dir singlepass --profiles-dir singlepass
      - name: Verify the tpc-di catalog carries Delta table stats
        run: python ./tools/check_catalog_stats.py singlepass/target/catalog.json tpcdi
      - name: Upload tpc-di docs (static stats page)
        uses: actions/upload-artifact@v4
        with:
          name: docs-tpcdi
          path: singlepass/target/static_index.html
          if-no-files-found: error

      # dbt-native transformation tests — the per-model correctness gate (uniqueness, referential
      # integrity, enum domains). Read-only over the OneLake Delta tables (delta_scan views); runs
      # LAST, after the warehouse build and docs; a fresh token first (dbt may have run for hours).
      - name: Re-acquire a fresh OneLake bearer token before dbt test
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: dbt test (validate transformations against the OneLake warehouse)
        run: dbt test --project-dir singlepass --profiles-dir singlepass

      # End-state audit: the single-pass-valid subset of the TPC-DI Appendix-A checks, run against
      # the finished OneLake warehouse + the PDGF *_audit.csv answer keys under Files/tpcdi/sf<N>.
      # Blocking: any FAIL exits nonzero and fails the job (WARN lines are non-fatal). A fresh token
      # first (dbt may have run for hours); WAREHOUSE_PATH and TPCDI_DIR are already in $GITHUB_ENV.
      - name: Re-acquire a fresh OneLake bearer token before the audit
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Audit (Appendix-A end-state subset — blocking)
        run: python ./tools/run_audit.py

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tpc-di-logs
          path: |
            singlepass/logs/
            singlepass/target/
          if-no-files-found: ignore

  # Second mode: the sequential 3-batch load (the sequential/ dbt project) into a
  # SEPARATE schema (tpcdi<SF>_seq). Runs AFTER the single-pass job so the OneLake seed
  # is already present (it reuses it, --skip-generate). Different schema => no clash with
  # the single-pass warehouse. During the build-out this validates only the historical
  # load (--batches 1); it flips to the full 3 batches + audit once the merge branches land.
  tpc-di-sequential:
    needs: tpc-di
    runs-on: ubuntu-latest
    env:
      TPCDI_SF: ${{ inputs.scale_factor || vars.TPCDI_SF || '3' }}
      WS_ID: 1c52481c-0523-4a5a-bbde-fdc932bd77c2
      LH_NAME: tpcdi
      # Sequential warehouse schema — sibling of the single-pass tpcdi<SF>.
      DBT_SCHEMA: tpcdi${{ inputs.scale_factor || vars.TPCDI_SF || '3' }}_seq
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_TRANSPORT_OPTION_TYPE: curl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install duckrun (dbt-duckdb + duckdb + deltalake) + obstore
        run: pip install --quiet -r requirements.txt
      - name: Azure login (OIDC federation — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Resolve the 'tpcdi' lakehouse OneLake paths (seed already streamed by tpc-di)
        run: |
          set -euo pipefail
          BASE="https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/lakehouses"
          LH_ID="$(az rest --method get --resource https://api.fabric.microsoft.com --url "$BASE" \
            --query "value[?displayName=='$LH_NAME'].id | [0]" -o tsv 2>/dev/null)"
          if [ -z "${LH_ID:-}" ] || [ "$LH_ID" = "None" ]; then
            echo "lakehouse '$LH_NAME' not found"; exit 1
          fi
          ROOT="abfss://$WS_ID@onelake.dfs.fabric.microsoft.com/$LH_ID"
          {
            echo "WAREHOUSE_PATH=$ROOT/Tables"
            echo "TPCDI_DIR=$ROOT/Files/tpcdi/sf${TPCDI_SF}"
          } >> "$GITHUB_ENV"
          echo "lakehouse '$LH_NAME' = $LH_ID"
      - name: Acquire a fresh OneLake bearer token
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ONELAKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: dbt deps (sequential project — dbt_utils)
        run: dbt deps --project-dir sequential --profiles-dir sequential
      - name: Sequential load + dbt test (historical batch only during build-out)
        run: python ./scripts/run_sequential.py --skip-generate --target onelake --batches 1
      - name: Upload sequential logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tpc-di-sequential-logs
          path: |
            sequential/logs/
            sequential/target/
          if-no-files-found: ignore
